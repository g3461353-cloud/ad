<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Free - Hub Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 120px; /* Garante que o anúncio não cubra o conteúdo */
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .app-placeholder {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            background-color: #161b22;
            color: #8b949e;
            font-style: italic;
        }

        /* Container de Anúncio Customizado */
        .ad-container {
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            background-color: #161b22;
            border-top: 1px solid #30363d;
            padding: 10px 0;
            z-index: 99998;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Free</h1>
        <p>Utilidades, Jogos e Aprendizado. Tudo grátis, sem complicação.</p>
        
        <div class="app-placeholder">
            [ Espaço reservado para as ferramentas e jogos do ecossistema The Free ]
        </div>
    </div>

    <!-- AREA DO ANÚNCIO FIXO NO RODAPÉ -->
    <div class="ad-container">
        <!-- BEGIN AADS AD UNIT 2441579 -->
        <div id="frame" style="width: 100%; margin: auto; position: relative; z-index: 99999;">
            <iframe data-aa='2441579' src='//acceptable.a-ads.com/2441579/?size=Adaptive' style='border:0; padding:0; width:100%; max-width:728px; height:90px; overflow:hidden; display: block; margin: auto;'></iframe>
        </div>
        <!-- END AADS AD UNIT 2441579 -->
    </div>

</body>
</html>
