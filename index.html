<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>The Free Hub</title>
</head>
<body>

    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
        <iframe data-aa='2442084' src='https://acceptable.a-ads.com/2442084/?size=Adaptive' style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
    </div>
    <script>
        const hostBridge = window.ipcRenderer || 
                           (window.chrome && window.chrome.webview) || 
                           window.webkit?.messageHandlers?.webview;

        function executarAutoResize() {
            const larguraDesejada = window.screen.availWidth;
            const alturaDesejada = window.screen.availHeight;

            try {
                window.moveTo(0, 0);
                window.resizeTo(larguraDesejada, alturaDesejada);
            } catch (e) {}

            if (hostBridge) {
                try {
                    if (typeof hostBridge.invoke === 'function') {
                        hostBridge.invoke('ponte-executora-direta', { funcao: 'redimensionarJanela', parametros: [larguraDesejada, alturaDesejada] });
                    } else if (typeof hostBridge.postMessage === 'function') {
                        hostBridge.postMessage(`redimensionarJanela:${larguraDesejada},${alturaDesejada}`);
                    } else if (typeof hostBridge.send === 'function') {
                        hostBridge.send('redimensionarJanela', larguraDesejada, alturaDesejada);
                    }
                } catch (e) {}
            }
        }

        window.addEventListener('DOMContentLoaded', executarAutoResize);
    </script>
</body>
</html>
